# ─────────────────────────────────────────────────────────────
# redis.conf — Phase 1: Queue Foundation
# ─────────────────────────────────────────────────────────────
# Redis works fine with zero config — but these settings
# directly affect what happens when workers crash mid-job,
# when memory fills up, and how fast you can inspect state.
# ─────────────────────────────────────────────────────────────


# ── PERSISTENCE ───────────────────────────────────────────────
# This is the most important section for a job queue.
# The question is: if Redis crashes, what happens to queued jobs?

# AOF (Append Only File) — every write operation is logged
# to disk immediately. On restart, Redis replays the log
# and reconstructs exact queue state.
appendonly yes

# How often to flush the AOF log to disk:
#   always   → flush on every write. Safest, slowest.
#   everysec → flush once per second. Lose max 1 second of jobs on crash.
#   no       → let the OS decide. Fastest, least safe.
# For a learning queue, everysec is the right tradeoff.
appendfsync everysec

# RDB snapshots — a point-in-time dump of all data.
# Format: save <seconds> <minimum-changes-before-saving>
# This says: if 1 job was written in the last 900 seconds, save.
#            if 10 jobs were written in the last 300 seconds, save.
#            if 100 jobs were written in the last 60 seconds, save.
# AOF handles the in-between. RDB is your recovery backup.
save 900 1
save 300 10
save 60 100


# ── MEMORY ────────────────────────────────────────────────────
# This is where the "900MB of 1024MB" from the image lives —
# but applied to Redis rather than the edge API container.
# Without a limit, Redis will consume all available RAM
# and the OS will kill it with no warning.

maxmemory 256mb

# What Redis does when it hits the memory ceiling:
#   noeviction      → reject new writes, return error. Queue stops accepting jobs.
#   allkeys-lru     → evict least recently used keys (dangerous for a queue)
#   volatile-lru    → only evict keys with an expiry set
# For a job queue, noeviction is correct — you want to KNOW
# when you're out of memory, not silently lose jobs.
maxmemory-policy noeviction


# ── NETWORKING ────────────────────────────────────────────────
# By default Redis only listens on 127.0.0.1 (localhost).
# Inside Docker, containers are not localhost to each other —
# they're on the bridge network. bind 0.0.0.0 means
# "accept connections from any interface", which includes
# the docker bridge network your API and workers are on.
bind 0.0.0.0

# Default port, kept explicit for clarity.
port 6379

# How long to keep idle client connections alive (seconds).
# 0 = never timeout. Fine for local dev, set a value in prod.
timeout 0


# ── OBSERVABILITY ─────────────────────────────────────────────
# Slow log captures any command that takes longer than
# this threshold (in microseconds). 10000 = 10ms.
# Run SLOWLOG GET in redis-cli to see slow operations.
# Useful when your queue starts getting large.
slowlog-log-slower-than 10000
slowlog-max-len 128

# Log level: debug | verbose | notice | warning
# notice is right for development — you see important events
# without drowning in noise.
loglevel notice